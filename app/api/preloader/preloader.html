<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Preloader</title>
  <style>
    :root {
      --bg-1: #efab56;
      --bg-2: #e4934f;
      --bg-3: #d57f49;
      --bg-4: #bf714f;
      --bg-5: #946454;
      --bg-6: #6f514d;

      --logo-opacity: 0.20;
      --logo-width: min(86vw, 1180px);
      --logo-min-width: 260px;
      --logo-aspect: 2 / 1;

      --shimmer-duration: 12s;
      --shimmer-angle: 135deg;
      --shimmer-band-start: 40.8%;
      --shimmer-band-mid: 50%;
      --shimmer-band-end: 59.2%;
      --shimmer-spread: 340% 340%;

      --outro-duration: 1100ms;
      --display-duration: 35000ms;
      --text-opacity: 0.22;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #19110f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { overflow: hidden; }

    .page-demo {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #faf7f4 0%, #f3ece7 100%);
      color: #413533;
    }

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(22vw 18vw at 48% 6%, rgba(255, 247, 184, 0.55), transparent 62%),
        radial-gradient(90vw 45vw at 50% 100%, rgba(84, 42, 41, 0.28), transparent 65%),
        linear-gradient(180deg,
          var(--bg-1) 0%,
          var(--bg-2) 18%,
          var(--bg-3) 42%,
          var(--bg-4) 64%,
          var(--bg-5) 84%,
          var(--bg-6) 100%);
      opacity: 1;
      visibility: visible;
      transition:
        opacity var(--outro-duration) cubic-bezier(.22,1,.36,1),
        visibility 0s linear var(--outro-duration);
    }

    .preloader::before,
    .preloader::after {
      content: "";
      position: absolute;
      inset: -10%;
      pointer-events: none;
    }

    .preloader::before {
      background:
        radial-gradient(28% 16% at 50% 9%, rgba(255, 246, 198, 0.22), transparent 72%),
        radial-gradient(50% 28% at 50% 70%, rgba(255, 165, 104, 0.10), transparent 72%);
      filter: blur(42px);
      opacity: 0.9;
      animation: ambientFloat 18s ease-in-out infinite alternate;
    }

    .preloader::after {
      background:
        radial-gradient(48% 36% at 50% 86%, rgba(53, 28, 30, 0.22), transparent 70%),
        radial-gradient(22% 14% at 52% 7%, rgba(255, 245, 201, 0.14), transparent 72%);
      filter: blur(58px);
      opacity: 0.95;
      animation: ambientFloat 24s ease-in-out infinite alternate-reverse;
    }

    .preloader.is-outro {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .preloader__inner {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px 92px;
      transition:
        transform var(--outro-duration) cubic-bezier(.22,1,.36,1),
        filter var(--outro-duration) cubic-bezier(.22,1,.36,1),
        opacity var(--outro-duration) cubic-bezier(.22,1,.36,1);
    }

    .preloader.is-outro .preloader__inner {
      transform: scale(0.988);
      filter: blur(10px);
      opacity: 0;
    }

    .logo-stage {
      position: relative;
      width: clamp(var(--logo-min-width), var(--logo-width), 100%);
      aspect-ratio: var(--logo-aspect);
      transform: translateZ(0);
      contain: layout paint style;
      isolation: isolate;
    }

    .logo-static,
    .logo-shimmer,
    .logo-glow {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      pointer-events: none;
      -webkit-mask-image: url('./logo.svg');
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: url('./logo.svg');
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    .logo-static {
      background-color: rgba(255, 255, 255, var(--logo-opacity));
      opacity: 1;
      filter: blur(0.12px);
    }

    .logo-shimmer,
    .logo-glow {
      will-change: background-position;
      background-repeat: no-repeat;
      background-size: var(--shimmer-spread);
      background-position: 170% 170%;
      opacity: 1;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .logo-glow {
      background-image:
        linear-gradient(
          var(--shimmer-angle),
          transparent 0%,
          transparent calc(var(--shimmer-band-start) - 5.4%),
          rgba(255, 220, 165, 0.00) calc(var(--shimmer-band-start) - 2.2%),
          rgba(255, 226, 176, 0.22) calc(var(--shimmer-band-start) + 1.2%),
          rgba(255, 245, 214, 0.48) var(--shimmer-band-mid),
          rgba(255, 226, 176, 0.22) calc(var(--shimmer-band-end) - 1.2%),
          rgba(255, 220, 165, 0.00) calc(var(--shimmer-band-end) + 2.2%),
          transparent calc(var(--shimmer-band-end) + 5.4%),
          transparent 100%
        );
      filter: blur(9px) brightness(1.08);
      animation: shimmerFrontGlow var(--shimmer-duration) linear infinite;
      mix-blend-mode: screen;
    }

    .logo-shimmer {
      background-image:
        linear-gradient(
          var(--shimmer-angle),
          transparent 0%,
          transparent calc(var(--shimmer-band-start) - 2.8%),
          rgba(255, 226, 176, 0.00) calc(var(--shimmer-band-start) - 0.8%),
          rgba(255, 233, 196, 0.40) calc(var(--shimmer-band-start) + 1.2%),
          rgba(255, 255, 255, 1) var(--shimmer-band-mid),
          rgba(255, 233, 196, 0.40) calc(var(--shimmer-band-end) - 1.2%),
          rgba(255, 226, 176, 0.00) calc(var(--shimmer-band-end) + 0.8%),
          transparent calc(var(--shimmer-band-end) + 2.8%),
          transparent 100%
        );
      filter: blur(1.4px) brightness(1.12);
      animation: shimmerFront var(--shimmer-duration) linear infinite;
      mix-blend-mode: screen;
    }

    .preloader__label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(26px, env(safe-area-inset-bottom, 0px) + 18px);
      margin: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 247, 236, 0.9);
      opacity: var(--text-opacity);
      text-shadow: 0 1px 10px rgba(255,255,255,0.08);
      user-select: none;
      padding: 0 16px;
      animation: labelPulse 4.8s ease-in-out infinite;
    }

    @keyframes shimmerFront {
      from { background-position: 170% 170%; }
      to { background-position: -170% -170%; }
    }

    @keyframes shimmerFrontGlow {
      from { background-position: 172% 172%; }
      to { background-position: -172% -172%; }
    }

    @keyframes ambientFloat {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(0, -1.6%, 0) scale(1.03); }
    }

    @keyframes labelPulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }

    @media (max-width: 900px) {
      :root {
        --logo-width: min(92vw, 820px);
        --logo-opacity: 0.20;
      }
      .preloader__label {
        font-size: 10px;
        letter-spacing: 0.28em;
      }
    }

    @media (max-width: 640px) {
      :root {
        --logo-width: min(94vw, 680px);
        --logo-min-width: 220px;
        --logo-opacity: 0.20;
        --shimmer-spread: 360% 360%;
      }
      .preloader {
        background:
          radial-gradient(75vw 48vw at 48% 1%, rgba(255, 247, 184, 0.55), transparent 62%),
          radial-gradient(90vw 45vw at 50% 100%, rgba(84, 42, 41, 0.28), transparent 65%),
          linear-gradient(180deg,
            var(--bg-1) 0%,
            var(--bg-2) 18%,
            var(--bg-3) 42%,
            var(--bg-4) 64%,
            var(--bg-5) 84%,
            var(--bg-6) 100%);
      }
      .preloader::before {
        background:
          radial-gradient(28% 16% at 50% 5%, rgba(255, 246, 198, 0.22), transparent 72%),
          radial-gradient(50% 28% at 50% 70%, rgba(255, 165, 104, 0.10), transparent 72%);
      }
      .preloader::after {
        background:
          radial-gradient(48% 36% at 50% 86%, rgba(53, 28, 30, 0.22), transparent 70%),
          radial-gradient(22% 14% at 52% 4%, rgba(255, 245, 201, 0.14), transparent 72%);
      }
      .preloader__inner { padding-bottom: 76px; }
      .logo-glow { filter: blur(7px) brightness(1.06); }
      .logo-shimmer { filter: blur(1.1px) brightness(1.08); }
    }

    @supports not ((-webkit-mask-image: url('logo.svg')) or (mask-image: url('logo.svg'))) {
      .logo-glow,
      .logo-shimmer { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .preloader::before,
      .preloader::after,
      .logo-glow,
      .logo-shimmer,
      .preloader__label {
        animation: none !important;
      }
      .logo-glow,
      .logo-shimmer {
        opacity: 0.18;
        background-position: center;
      }
      .preloader__label {
        opacity: var(--text-opacity);
      }
    }
  </style>
</head>
<body>
  <main class="page-demo" aria-hidden="true"></main>

  <div class="preloader" id="preloader" aria-hidden="true">
    <div class="preloader__inner">
      <div class="logo-stage" aria-hidden="true">
        <div class="logo-static"></div>
        <div class="logo-glow"></div>
        <div class="logo-shimmer"></div>
      </div>

      <p class="preloader__label">Пожалуйста, подождите, готовим страницу</p>
    </div>
  </div>

  <script>
    const CONFIG = {
      displayDuration: 35000,
      outroDelay: 40
    };

    const preloader = document.getElementById('preloader');

    function hidePreloader() {
      if (!preloader || preloader.classList.contains('is-outro')) return;
      window.setTimeout(() => {
        preloader.classList.add('is-outro');
      }, CONFIG.outroDelay);
    }

    window.hidePreloader = hidePreloader;

    window.addEventListener('load', () => {
      window.setTimeout(hidePreloader, CONFIG.displayDuration);
    }, { once: true });
  </script>
</body>
</html>
